spring:
  application.name: skill-track
  datasource:
    url: jdbc:mysql://localhost:3306/skill_track_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate.ddl-auto: update
    show-sql: true
    properties.hibernate:
      dialect: org.hibernate.dialect.MySQLDialect
      format_sql: true
  mvc.problem-details.enabled: true
server.port: 8080
springdoc:
  api-docs.path: /api-docs
  swagger-ui.path: /swagger-ui.html

management:
  endpoints.web.exposure.include: health,info,metrics
  endpoint.health.show-details: always

spring.cache:
  type: caffeine
  caffeine.spec: maximumSize=500,expireAfterWrite=10m
